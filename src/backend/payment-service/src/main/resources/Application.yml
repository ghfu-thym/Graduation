  payment-endpoint: https://test-payment.momo.vn/v2/gateway/api/create
  refund-endpoint: https://test-payment.momo.vn//v2/gateway/api/refund
  partner-code: MOMO
  access-key: F8BBA842ECF85
  secret-key: K951B6PE1waDMi640xX08PD3vg6EkVlz
  # URL chuyển hướng về Frontend sau khi khách thanh toán xong (Return URL)
  redirect-url: http://localhost:8082/api/v1/payments/momo-return
