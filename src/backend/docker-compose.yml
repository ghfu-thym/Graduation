services:
  # 1. Database chính (Ví dụ MySQL)
  ticket-mysql:
    image: mysql:8.0
    container_name: ticket_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 3307a001
      MYSQL_DATABASE: ticket_system_db
      MYSQL_USER: myuser
      MYSQL_PASSWORD: mypassword
    ports:
      - "3306:3306" # Map port để Spring Boot ở localhost gọi vào được
    volumes:
      - mysql_data:/var/lib/mysql # QUAN TRỌNG: Giữ lại data khi tắt container

  # 2. Redis dùng cho Pub/Sub Timeout và Lock
  ticket-redis:
    image: redis:alpine
    container_name: ticket_cache
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass your_redis_password # Cài pass cho bảo mật
    volumes:
      - redis_data:/data

    # 3. PostgreSQL cho Ticket Service
  ticket-postgres:
    image: postgres:15-alpine
    container_name: ticket_postgres
    restart: always
    environment:
      POSTGRES_USER: ticket_user
      POSTGRES_PASSWORD: ticket_password
      POSTGRES_DB: ticket_service_db
    ports:
      - "5432:5432" # Map port mặc định của Postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
  # 4. Kafka (KRaft mode - Apache Official Image, không cần Zookeeper)
  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka-broker
    restart: always
    ports:
      - "9092:9092"       # External (Spring Boot trên localhost kết nối qua đây)
    environment:
      # KRaft
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-broker:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Listeners: EXTERNAL cho host, INTERNAL cho container-to-container
      KAFKA_LISTENERS: EXTERNAL://:9092,INTERNAL://:9094,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9092,INTERNAL://kafka-broker:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      # Topic
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Single-node defaults
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # Cluster ID (bắt buộc cho KRaft)
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_data:/tmp/kraft-combined-logs

  # 5. Kafka UI - Giao diện quản lý Kafka
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: always
    ports:
      - "8090:8080"       # Truy cập UI tại http://localhost:8090
    environment:
      - KAFKA_CLUSTERS_0_NAME=Local-Kafka-Cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka-broker:9094
    depends_on:
      - kafka
# Khai báo ổ cứng ảo để dữ liệu không bị mất khi gõ docker-compose down
volumes:
  mysql_data:
  redis_data:
  postgres_data:
  kafka_data:
